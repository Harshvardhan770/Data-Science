<svg width="100%" viewBox="0 0 880 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Data Science Banner</title>
  <desc>Banner for Data Science repository with Python and Jupyter Notebooks</desc>

  <rect width="880" height="200" rx="12" fill="#0f0a1e"/>

  <!-- faint horizontal lines -->
  <g stroke="#2d1b6b" stroke-width="0.5" opacity="0.6">
    <line x1="560" y1="40" x2="860" y2="40"/>
    <line x1="560" y1="70" x2="860" y2="70"/>
    <line x1="560" y1="100" x2="860" y2="100"/>
    <line x1="560" y1="130" x2="860" y2="130"/>
    <line x1="560" y1="160" x2="860" y2="160"/>
    <line x1="560" y1="40" x2="560" y2="170"/>
    <line x1="620" y1="40" x2="620" y2="170"/>
    <line x1="680" y1="40" x2="680" y2="170"/>
    <line x1="740" y1="40" x2="740" y2="170"/>
    <line x1="800" y1="40" x2="800" y2="170"/>
    <line x1="860" y1="40" x2="860" y2="170"/>
  </g>

  <!-- bar chart -->
  <g opacity="0.9">
    <rect x="572" y="118" width="28" height="42" rx="3" fill="#7c3aed"/>
    <rect x="614" y="90"  width="28" height="70" rx="3" fill="#9333ea"/>
    <rect x="656" y="65"  width="28" height="95" rx="3" fill="#a855f7"/>
    <rect x="698" y="80"  width="28" height="80" rx="3" fill="#c084fc"/>
    <rect x="740" y="50"  width="28" height="110" rx="3" fill="#e879f9"/>
    <rect x="782" y="95"  width="28" height="65" rx="3" fill="#c084fc"/>
    <rect x="824" y="72"  width="28" height="88" rx="3" fill="#a855f7"/>
  </g>

  <!-- line chart on top -->
  <polyline points="586,118 628,90 670,65 712,80 754,50 796,95 838,72" fill="none" stroke="#f0abfc" stroke-width="2" opacity="0.8"/>

  <!-- data points -->
  <g fill="#f0abfc">
    <circle cx="586" cy="118" r="4"/>
    <circle cx="628" cy="90"  r="4"/>
    <circle cx="670" cy="65"  r="4"/>
    <circle cx="712" cy="80"  r="4"/>
    <circle cx="754" cy="50"  r="5" fill="#ffffff"/>
    <circle cx="796" cy="95"  r="4"/>
    <circle cx="838" cy="72"  r="4"/>
  </g>

  <!-- peak label -->
  <rect x="732" y="28" width="44" height="16" rx="8" fill="#581c87"/>
  <text x="754" y="39" text-anchor="middle" fill="#f0abfc" font-size="9" font-family="Arial, sans-serif" font-weight="700">peak</text>
  <line x1="754" y1="44" x2="754" y2="50" stroke="#f0abfc" stroke-width="1" opacity="0.6"/>

  <!-- scatter dots -->
  <g opacity="0.4">
    <circle cx="575" cy="155" r="2.5" fill="#e879f9"/>
    <circle cx="592" cy="148" r="2" fill="#a855f7"/>
    <circle cx="608" cy="152" r="3" fill="#e879f9"/>
    <circle cx="625" cy="145" r="2" fill="#c084fc"/>
    <circle cx="641" cy="150" r="2.5" fill="#a855f7"/>
    <circle cx="657" cy="143" r="2" fill="#e879f9"/>
  </g>

  <!-- baseline -->
  <line x1="560" y1="162" x2="860" y2="162" stroke="#2d1b6b" stroke-width="1"/>

  <!-- accent bar -->
  <rect x="60" y="62" width="4" height="76" rx="2" fill="#a855f7"/>

  <!-- main title -->
  <text x="84" y="95" fill="#ffffff" font-size="36" font-family="Arial, sans-serif" font-weight="700">Data</text>
  <text x="84" y="130" fill="#e879f9" font-size="36" font-family="Arial, sans-serif" font-weight="700">Science</text>
  <text x="84" y="149" fill="#4b5563" font-size="12" font-family="Arial, sans-serif" letter-spacing="2">ML · EDA · VISUALIZATION</text>

  <!-- tags -->
  <rect x="84" y="158" width="52" height="18" rx="9" fill="#1a0533" stroke="#581c87" stroke-width="1"/>
  <text x="110" y="171" text-anchor="middle" fill="#d8b4fe" font-size="10" font-family="Arial, sans-serif">Python</text>

  <rect x="144" y="158" width="52" height="18" rx="9" fill="#1a0533" stroke="#581c87" stroke-width="1"/>
  <text x="170" y="171" text-anchor="middle" fill="#d8b4fe" font-size="10" font-family="Arial, sans-serif">Jupyter</text>

  <rect x="204" y="158" width="52" height="18" rx="9" fill="#1a0533" stroke="#581c87" stroke-width="1"/>
  <text x="230" y="171" text-anchor="middle" fill="#d8b4fe" font-size="10" font-family="Arial, sans-serif">Pandas</text>

  <rect x="264" y="158" width="52" height="18" rx="9" fill="#1a0533" stroke="#581c87" stroke-width="1"/>
  <text x="290" y="171" text-anchor="middle" fill="#d8b4fe" font-size="10" font-family="Arial, sans-serif">ML</text>

  <text x="84" y="190" fill="#374151" font-size="11" font-family="Arial, sans-serif">by Harshvardhan Dhere</text>
</svg>
